<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Media</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="leitura.png">
</head>

<body>

    <div class="container-header">

        <header>
            <h1>Calcule sua Média</h1>
            <hr>
            <p>Informe suas notas para calcular a média final.</p>

        </header>

    </div><!--fim container-header-->


    <div class="container-inputs">

        <main>
            <form>
                <label for="nota1" name="nota1">Nota 1:</label>
                <input name="nota1" type="number" placeholder="Digite a nota..." class="nota1">

                <label for="nota2" name="nota2">Nota 2:</label>
                <input name="nota2" type="number" placeholder="Digite a nota..." class="nota2">

                <label for="nota3" name="nota3">Nota 3:</label>
                <input name="nota3" type="number" placeholder="Digite a nota..." class="nota3">

                <input type="submit" name="btn_media" value="Calcular Media" class="btn_media">


            </form>





    </div><!--fim container-inputs-->

    <div class="result">
        

    </div><!--fim result-->

    <div class="icone">
        <img src="leitura.png">

    </div><!--fim icone-->

    </main>







    <script src="script.js"></script>
</body>

</html>
